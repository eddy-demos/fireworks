<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Interactive July 4th Fireworks Show</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;900&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #000000; height: 100%; overflow: hidden; }
    #stage {
      width: 100vw;
      height: 100vh;
      background: linear-gradient(180deg, #0A0A1E 0%, #05050F 45%, #000000 100%);
      position: relative;
      overflow: hidden;
    }
    #stage canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }
    #hint {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 28px;
      z-index: 2;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }
    #hint span {
      font-family: 'Inter Tight', sans-serif;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 0.10em;
      color: rgba(255, 255, 255, 0.40);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="stars"></canvas>
    <canvas id="fireworks"></canvas>
    <div id="hint"><span>Press and hold to see something magical</span></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
